<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion – Gestionnaire de Tâches</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="icon" type="image/gif" href="6172541.gif">
  <link rel="stylesheet" href="login.css">
</head>
<body>

<div class="login-container">
  <h2>Connexion</h2>
  <form id="loginForm">
    <div class="form-group">
      <label for="username">Nom d'utilisateur</label>
      <input type="text" id="username" name="username" placeholder="Entrez votre nom d'utilisateur" required>
    </div>
    <div class="form-group">
      <label for="password">Mot de passe</label>
      <input type="password" id="password" name="password" placeholder="Entrez votre mot de passe" required>
    </div>
    <button type="submit" class="btn-login">Se connecter</button>
  </form>
  <div class="message" id="message"></div>
  <p style="text-align:center; margin-top:16px;">Pas encore de compte ? <a href="register.html">Créer un compte</a></p>
</div>

<script>
const loginForm = document.getElementById("loginForm");
const messageDiv = document.getElementById("message");

loginForm.addEventListener("submit", function(e) {
  e.preventDefault();

  const formData = new FormData(loginForm);
  const data = Object.fromEntries(formData.entries());

  fetch("login_backend.php", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(data)
  })
  .then(res => res.json())
  .then(result => {
    if(result.success) {
      messageDiv.style.color = "green";
      messageDiv.textContent = "Connexion réussie ! Redirection...";
      setTimeout(() => window.location.href = "dashboard.html", 1000);
    } else {
      messageDiv.style.color = "red";
      messageDiv.textContent = result.message || "Nom d'utilisateur ou mot de passe incorrect.";
    }
  })
  .catch(err => {
    messageDiv.style.color = "red";
    messageDiv.textContent = "Erreur serveur. Veuillez réessayer.";
    console.error(err);
  });
});
</script>

</body>
</html>
